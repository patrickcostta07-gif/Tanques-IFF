
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFF — Monitoramento de Tanques</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#fff;--border:rgba(0,0,0,.1);--border-em:rgba(0,0,0,.2);
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#909090;
  --radius:12px;--radius-sm:8px;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --pink:#993556;--pink-l:#FBEAF0;--pink-d:#72243E;
  --ok:#3B6D11;--ok-dot:#639922;--ok-bg:#EAF3DE;
  --warn:#854F0B;--warn-dot:#BA7517;--warn-bg:#FAEEDA;--warn-bd:#EF9F27;
  --crit:#A32D2D;--crit-dot:#E24B4A;--crit-bg:#FCEBEB;--crit-bd:#E24B4A;
  --teal:#0F6E56;--teal-bg:#E1F5EE;
  --purple:#5B3FA6;--purple-bg:#EDE9FA;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141414;--surface:#1e1e1e;--border:rgba(255,255,255,.1);--border-em:rgba(255,255,255,.2);
    --text:#f0f0f0;--text2:#aaa;--text3:#666;
    --blue-l:#0c2a45;--blue-d:#85B7EB;
    --pink-l:#3a1424;--pink-d:#ED93B1;
    --ok-bg:#1a2e0a;--warn-bg:#2e1e05;--crit-bg:#2e0a0a;--teal-bg:#04342C;--purple-bg:#1e1640;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 14px 56px}
.page{max-width:800px;margin:0 auto}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:.5px solid var(--border)}
.h-brand{display:flex;align-items:center;gap:10px}
.h-logo{width:38px;height:38px;border-radius:var(--radius-sm);background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.h1{font-size:17px;font-weight:700;color:var(--text)}
.hsub{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#639922;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.h-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.lupdate{font-size:11px;color:var(--text3)}
.offline-badge{display:none;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;background:#FAEEDA;color:#854F0B;border:.5px solid #EF9F27}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:540px){.grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:1.2rem}
.card-hd{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.icon-o2{background:var(--blue-l);color:var(--blue)}
.icon-n2o{background:var(--pink-l);color:var(--pink)}
.ctitle{font-size:15px;font-weight:600;color:var(--text)}
.badge{margin-left:auto;padding:3px 9px;border-radius:var(--radius-sm);font-size:11px;font-weight:500}
.badge-o2{background:var(--blue-l);color:var(--blue-d)}
.badge-n2o{background:var(--pink-l);color:var(--pink-d)}
.alert-box{padding:9px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:11px;display:none}
.a-warn{background:var(--warn-bg);color:var(--warn);border:.5px solid var(--warn-bd)}
.a-crit{background:var(--crit-bg);color:var(--crit);border:.5px solid var(--crit-bd)}

/* METRICS */
.metrics{display:flex;gap:8px;margin-bottom:11px;flex-wrap:wrap}
.metric{flex:1;min-width:70px;background:var(--bg);border-radius:var(--radius-sm);padding:9px 10px}
.ml{font-size:10px;color:var(--text3);margin-bottom:3px}
.mv{font-size:17px;font-weight:600;color:var(--text)}
.mu{font-size:11px;font-weight:400;color:var(--text2)}
.mc{background:var(--teal-bg)}.mc .ml,.mc .mv{color:var(--teal)}
.mp{background:var(--purple-bg)}.mp .ml,.mp .mv{color:var(--purple)}

/* GAUGE */
.gauge-wrap{margin-bottom:11px}
.gauge-top{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px}
.gauge-track{height:10px;background:var(--bg);border-radius:5px;overflow:hidden}
.gauge-fill{height:100%;border-radius:5px;transition:width .5s,background .3s}
.srow{display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:11px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot-ok{background:var(--ok-dot)}.dot-warn{background:var(--warn-dot)}.dot-crit{background:var(--crit-dot)}
.st-ok{color:var(--ok)}.st-warn{color:var(--warn)}.st-crit{color:var(--crit)}

hr.dv{border:none;border-top:.5px solid var(--border);margin:.9rem 0}
.slabel{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:9px}

/* FIELDS */
.field{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.field label{font-size:12px;color:var(--text2);width:84px;flex-shrink:0;padding-top:7px}
.field input,.field textarea{flex:1;padding:7px 10px;border:.5px solid var(--border-em);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.field textarea{resize:vertical;min-height:54px;line-height:1.45}
.field input:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.13)}
.btn-reg{width:100%;margin-top:6px;padding:9px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,opacity .15s;font-family:inherit}
.btn-reg:disabled{opacity:.5;cursor:not-allowed}
.btn-o2{background:var(--blue);color:#fff}.btn-o2:hover:not(:disabled){background:var(--blue-d)}
.btn-n2o{background:var(--pink);color:#fff}.btn-n2o:hover:not(:disabled){background:var(--pink-d)}

/* WIDE CARDS */
.wide{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:1.2rem;margin-bottom:14px}
.top-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.tabs{display:flex;gap:5px}
.tab{padding:4px 13px;border:.5px solid var(--border-em);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:background .12s}
.tab:hover{background:var(--bg)}
