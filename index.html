<script>
// ... (o resto do HTML permanece o mesmo)

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxv18-9lVZK5BWMC3oe0-FiHzphZGtkEPxopz57E1zxNLL_Pt-Z_OLQDCS3O3of4OoV/exec";

function registerReading(gas) {
  const data = {
    gas: gas.toUpperCase(),
    max: document.getElementById(`in-${gas}-max`).value,
    nivel: document.getElementById(`in-${gas}-vol`).value,
    pressao: document.getElementById(`in-${gas}-pres`).value,
    responsavel: document.getElementById(`in-${gas}-user`).value || "Não informado",
    observacao: document.getElementById(`in-${gas}-obs`).value,
    data: new Date().toLocaleString('pt-BR')
  };

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(data),
    headers: { 'Content-Type': 'application/json' }
  })
  .then(res => res.text())
  .then(result => {
    if (result.includes("OK") || result.includes("Success")) {
      showToast(`✅ Leitura de ${gas.toUpperCase()} registrada com sucesso!`);
      loadData();
      // Limpa campos
      document.getElementById(`in-${gas}-vol`).value = '';
      document.getElementById(`in-${gas}-pres`).value = '';
      document.getElementById(`in-${gas}-obs`).value = '';
    } else {
      alert("Resposta do servidor: " + result);
    }
  })
  .catch(err => {
    console.error(err);
    alert("Erro ao salvar: " + err.message);
  });
}
</script>
